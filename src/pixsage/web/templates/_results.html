{% if hits %}
<div class="results-meta">
  {% if query %}{{ hits|length }} results for "{{ query }}"{% else %}{{ hits|length }} results{% endif %}
</div>
<div class="grid">
  {% for hit in hits %}
    {% include "_card.html" %}
  {% endfor %}
</div>
{% else %}
<div class="results-meta">No results.</div>
{% endif %}
